<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box}html,body{margin:0;width:900px;height:220px;background:#091421;color:#dce5f2;font-family:Arial,sans-serif}h1{height:42px;margin:0;padding-top:14px;text-align:center;font-size:17px;letter-spacing:2px;color:#8ea2b8}.row{display:flex;justify-content:center;gap:22px}.card{width:190px;height:154px;border:1px solid #25384b;border-radius:14px;background:#101f2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}.card img{width:76px;height:76px;object-fit:contain;filter:invert(1)}.label{font-size:16px;font-weight:700;letter-spacing:1px}.flights{border-color:#2678a5}.conflicts{border-color:#a83e48}.menu{border-color:#52606e}.speed{border-color:#278c4c}
</style>
</head>
<body>
<h1>PROPOSED TOP-BAR ICONS</h1>
<div class="row">
  <div class="card flights"><img src="plane.svg"><div class="label">FLIGHTS</div></div>
  <div class="card conflicts"><img src="triangle-exclamation.svg"><div class="label">CONFLICTS</div></div>
  <div class="card menu"><img src="bars.svg"><div class="label">MENU</div></div>
  <div class="card speed"><img src="forward-fast.svg"><div class="label">SPEED</div></div>
</div>
</body>
</html>
